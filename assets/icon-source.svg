<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E3322"/>
      <stop offset="100%" stop-color="#04130B"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F7CFF"/>
      <stop offset="100%" stop-color="#1E3FBF"/>
    </linearGradient>
    <linearGradient id="cardTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D9A8"/>
      <stop offset="100%" stop-color="#0E9E78"/>
    </linearGradient>
    <linearGradient id="cardGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD27A"/>
      <stop offset="100%" stop-color="#E8A33D"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#1B5C3C" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1B5C3C" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <g filter="url(#soft)">
    <!-- back card (blue), tilted left -->
    <g transform="rotate(-14 512 540)">
      <rect x="287" y="380" width="450" height="290" rx="36" fill="url(#cardBlue)"/>
      <rect x="287" y="450" width="450" height="34" fill="#0B1F66" opacity="0.55"/>
      <circle cx="660" cy="600" r="16" fill="#FFFFFF" opacity="0.35"/>
    </g>

    <!-- middle card (gold), tilted right -->
    <g transform="rotate(11 512 540)">
      <rect x="300" y="380" width="450" height="290" rx="36" fill="url(#cardGold)"/>
      <rect x="300" y="450" width="450" height="34" fill="#8A5A12" opacity="0.45"/>
      <circle cx="690" cy="600" r="16" fill="#FFFFFF" opacity="0.4"/>
    </g>

    <!-- front card (teal/green - the "picked" card), upright -->
    <g>
      <rect x="295" y="400" width="460" height="296" rx="38" fill="url(#cardTeal)"/>
      <rect x="295" y="472" width="460" height="36" fill="#06483A" opacity="0.4"/>
      <rect x="335" y="600" width="160" height="20" rx="10" fill="#FFFFFF" opacity="0.85"/>
      <rect x="335" y="636" width="100" height="16" rx="8" fill="#FFFFFF" opacity="0.55"/>
      <circle cx="690" cy="450" r="34" fill="#FFFFFF" opacity="0.25"/>
      <circle cx="665" cy="450" r="34" fill="#FFFFFF" opacity="0.15"/>
    </g>
  </g>

  <!-- best-pick badge -->
  <g transform="translate(700,330)" filter="url(#soft)">
    <circle r="78" fill="#FFFFFF"/>
    <circle r="78" fill="none" stroke="#0E9E78" stroke-width="6"/>
    <path d="M -34 2 L -10 26 L 36 -28" stroke="#0E9E78" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
